<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LLM Roadmap - Demo Frontend</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 80px; }
    button { margin-top: 10px; padding: 8px 16px; }
    #respuesta { margin-top: 20px; padding: 12px; background: #f4f4f4; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Demo: Frontend mínimo para una API de LLM</h1>
  <p>Este HTML consume el endpoint <code>/preguntar</code> de <code>api_demo.py</code> (módulo 5).</p>

  <textarea id="pregunta" placeholder="Escribe tu pregunta sobre LLMs..."></textarea>
  <br>
  <button onclick="preguntar()">Enviar</button>

  <div id="respuesta"></div>

  <script>
    async function preguntar() {
      const pregunta = document.getElementById("pregunta").value;
      const respuestaDiv = document.getElementById("respuesta");
      respuestaDiv.textContent = "Cargando...";

      try {
        const res = await fetch("http://127.0.0.1:8000/preguntar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pregunta: pregunta, usar_rag: true })
        });
        const data = await res.json();
        respuestaDiv.textContent = data.respuesta;
      } catch (error) {
        respuestaDiv.textContent = "Error al conectar con la API. ¿Está corriendo `uvicorn api_demo:app --reload`?";
      }
    }
  </script>
</body>
</html>
